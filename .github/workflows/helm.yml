name: Helm Chart CI

on:
  push:
    branches:
      - 3.0.x
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'
  pull_request:
    paths:
      - 'helm/**'
      - '.github/workflows/helm.yml'

jobs:
  lint:
    name: Lint Helm Chart
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Add Bitnami repo
        run: helm repo add bitnami https://charts.bitnami.com/bitnami

      - name: Add Meilisearch repo
        run: helm repo add meilisearch https://meilisearch.github.io/meilisearch-kubernetes

      - name: Update Helm dependencies
        run: helm dep update helm/solidinvoice

      - name: Lint chart (defaults)
        run: helm lint helm/solidinvoice

      - name: Lint chart (minimal values)
        run: helm lint helm/solidinvoice --values helm/solidinvoice/ci/minimal-values.yaml

      - name: Lint chart (MySQL values)
        run: helm lint helm/solidinvoice --values helm/solidinvoice/ci/mysql-values.yaml

      - name: Lint chart (PostgreSQL values)
        run: helm lint helm/solidinvoice --values helm/solidinvoice/ci/postgresql-values.yaml

      - name: Template chart (MySQL values)
        run: helm template solidinvoice helm/solidinvoice --values helm/solidinvoice/ci/mysql-values.yaml

      - name: Template chart (PostgreSQL values)
        run: helm template solidinvoice helm/solidinvoice --values helm/solidinvoice/ci/postgresql-values.yaml
