name: "Nightly Build"

concurrency:
  cancel-in-progress: true
  group: ${{ github.workflow }}-${{ github.ref }}

on:
  push:
    branches:
      - 3.0.x
    paths-ignore:
      - 'docs/**'

env:
  SOLIDINVOICE_ENV: prod
  SOLIDINVOICE_DEBUG: 0

permissions:
  contents: read

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ref: ${{ steps.check.outputs.ref }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Get version
        id: check
        run: |
          echo "ref=nightly" >> "${GITHUB_OUTPUT}"

  build-dist:
    permissions:
      contents: read
    name: Build Assets
    needs: [prepare]
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - name: Install PHP
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          coverage: none
          ini-values: memory_limit=-1
          php-version-file: .php-version

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2

      - name: Build Release Artifact
        run: "./scripts/build_dist.sh ${{ github.ref_name }} ${{ needs.prepare.outputs.ref }}"
        env:
          RELEASE: 0
          GH_TOKEN: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Upload TAR archive
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: SolidInvoice-${{ needs.prepare.outputs.ref || github.ref }}.tar.gz
          path: build/dist/SolidInvoice-${{ needs.prepare.outputs.ref || github.ref }}.tar.gz

  build-linux:
    name: Build Linux ${{ matrix.arch }} image
    needs: [prepare, build-dist]
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-24.04
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      SOLIDINVOICE_VERSION: ${{ needs.prepare.outputs.ref }}
      PHP_VERSION: 8.5
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8

      - uses: actions/setup-go@44694675825211faa026b3c33043df3e48a5fa00 # v6.0.0
        with:
          go-version-file: frankenphp/go.mod
          cache-dependency-path: frankenphp/go.sum

      - name: Install PHP
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          coverage: none
          ini-values: memory_limit=-1
          php-version: ${{ env.PHP_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y autoconf automake bison cmake flex libtool pkg-config re2c upx

      - name: Restore static-php cache
        id: restore-static-php
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: frankenphp/dist/static-php-cli
          key: linux-${{ matrix.arch }}-static-php-${{ env.PHP_VERSION }}-${{ hashFiles('frankenphp/build-static.sh', 'frankenphp/build-solidinvoice.sh') }}
          restore-keys: |
              linux-${{ matrix.arch }}-static-php-${{ env.PHP_VERSION }}-
              linux-${{ matrix.arch }}-static-php-

      - name: Download archive
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: SolidInvoice-${{ needs.prepare.outputs.ref || github.ref }}.tar.gz
          path: build/dist

      - name: Build SolidInvoice
        run: ./scripts/build_binary.sh ${{ needs.prepare.outputs.ref }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE: 0
          # Unset CI so build-static.sh preserves downloads/ and source/ for caching
          CI: ""
          SPC_OPT_DOWNLOAD_ARGS: "--ignore-cache-sources=php-src --retry 5 --prefer-pre-built"

      - name: Upload spc logs on failure
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: spc-logs-${{ matrix.arch }}
          path: |
            frankenphp/dist/static-php-cli/log/
          if-no-files-found: warn
          retention-days: 7

      - name: Save static-php cache
        if: steps.restore-static-php.outputs.cache-hit != 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: frankenphp/dist/static-php-cli
          key: linux-${{ matrix.arch }}-static-php-${{ env.PHP_VERSION }}-${{ hashFiles('frankenphp/build-static.sh', 'frankenphp/build-solidinvoice.sh') }}

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Copy binary to Docker context
        run: cp frankenphp/dist/solidinvoice-linux-${{ matrix.arch }} docker/solidinvoice

      - name: Build and push Docker image
        id: build
        uses: docker/bake-action@3acf805d94d93a86cce4ca44798a76464a75b88c # v6.9.0
        with:
          targets: package
          source: .
          set: |
            package.platform=${{ matrix.platform }}
            package.tags=
            package.output=type=image,name=solidinvoice/solidinvoice,push-by-digest=true,name-canonical=true,push=true
        env:
          NIGHTLY: 1
          SOLIDINVOICE_VERSION: ${{ needs.prepare.outputs.ref }}

      - name: Export digest for manifest merge
        run: |
          mkdir -p /tmp/digests
          digest=$(jq -r '."package"."containerimage.digest"' <<< "$METADATA")
          touch "/tmp/digests/${digest#sha256:}"
        env:
          METADATA: ${{ steps.build.outputs.metadata }}

      - name: Upload digest artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: digest-nightly-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  publish-docker:
    name: Publish multi-platform Docker image
    needs: [prepare, build-linux]
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2 # v2.13.2
        with:
          egress-policy: audit

      - name: Login to DockerHub
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          username: ${{ vars.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1

      - name: Download digests
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          pattern: digest-nightly-*
          path: /tmp/digests
          merge-multiple: true

      - name: Create and push multi-platform manifest
        run: |
          IMAGE="solidinvoice/solidinvoice"

          # Combine per-platform digests into a single multi-arch manifest
          # shellcheck disable=SC2086
          docker buildx imagetools create \
            -t "${IMAGE}:nightly" \
            $(printf "${IMAGE}@sha256:%s " $(ls /tmp/digests/))
