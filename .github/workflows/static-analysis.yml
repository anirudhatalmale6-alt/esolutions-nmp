name: Static Analysis

on:
  pull_request:
    paths-ignore:
      - 'docs/**'

jobs:
  phpstan:
    name: PHPStan

    runs-on: ubuntu-latest

    env:
      SOLIDINVOICE_ENV: test
      SOLIDINVOICE_DEBUG: 1

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: block
          allowed-endpoints: >
            185.125.188.54:443
            185.125.188.55:443
            185.125.188.59:443
            api.codecov.io:443
            api.github.com:443
            api.launchpad.net:443
            api.snapcraft.io:443
            archive.ubuntu.com:80
            azure.archive.ubuntu.com:80
            bun.sh:443
            cdn.jsdelivr.net:443
            codecov.io:443
            dl.cloudsmith.io:443
            esm.ubuntu.com:443
            esm.ubuntu.com:80
            getcomposer.org:443
            github.com:443
            keys.openpgp.org:443
            keyserver.ubuntu.com:443
            motd.ubuntu.com:443
            objects.githubusercontent.com:443
            packages.microsoft.com:443
            packages.microsoft.com:80
            packagist.org:443
            pecl.php.net:443
            pecl.php.net:80
            pgp.mit.edu:443
            ppa.launchpad.net:80
            ppa.launchpadcontent.net:443
            ppa.launchpadcontent.net:80
            registry.npmjs.org:443
            registry.yarnpkg.com:443
            release-assets.githubusercontent.com:443
            repo.packagist.org:443
            setup-php.com:443
            security.ubuntu.com:443
            security.ubuntu.com:80
            storage.googleapis.com:443

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Setup PHP
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          php-version-file: .php-version
          ini-values: date.timezone=Africa/Johannesburg, memory_limit=-1
          extensions: intl, gd, mysql, pdo_mysql, :xdebug

      - uses: ramsey/composer-install@3cf229dc2919194e9e36783941438d17239e8520 # v3

      - uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76 # v2

      - run: bun install

      - run: bun run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

      - name: Warm up cache
        run: bin/console cache:warmup -n -vvv -e test

      - name: Run PHPStan
        run: bin/phpstan analyse -c phpstan.test.neon

  rector:
    name: Rector
    runs-on: ubuntu-latest
    if: github.event.pull_request.head.repo.full_name == 'SolidInvoice/SolidInvoice'

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: block

      - name: Checkout
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
            # Must be used to trigger workflow after push
            token: ${{ secrets.GH_ACCESS_TOKEN }}

      - name: Setup PHP
        uses: shivammathur/setup-php@bf6b4fbd49ca58e4608c9c89fba0b8d90bd2a39f
        with:
          php-version-file: .php-version
          coverage: none

      - uses: ramsey/composer-install@3cf229dc2919194e9e36783941438d17239e8520
      - run: bin/rector --ansi
      - run: bin/ecs --fix --ansi

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: '[rector] Rector fixes'
          commit_author: 'GitHub Action <actions@github.com>'
          commit_user_email: 'action@github.com'
